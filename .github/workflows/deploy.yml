# =====================================================
# Foresight Studio — GitHub Pages Deploy with Secret Key
# =====================================================
name: Deploy Foresight Studio to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject config.js from secret
        run: |
          echo "// Auto-generated by GitHub Actions — do not commit" > config.js
          echo "var FORESIGHT_KEY = '${{ secrets.FORESIGHT_KEY }}';" >> config.js
          echo "window.FORESIGHT_KEY = '${{ secrets.FORESIGHT_KEY }}';" >> config.js
          echo "✅ config.js created"
        env:
          FORESIGHT_KEY: ${{ secrets.FORESIGHT_KEY }}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
