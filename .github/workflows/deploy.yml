# ==================================================
# Foresight Studio → GitHub Pages Deploy with Secret Key
# ==================================================
# This workflow:
#   1. Checks out your code
#   2. Injects the API key from GitHub secret into index.html
#   3. Deploys everything to GitHub Pages
#
# SETUP (one-time):
#   1. Go to your repo → Settings → Secrets and variables → Actions
#   2. Click "New repository secret"
#   3. Name:  FORESIGHT_KEY
#      Value: your actual LLM key (e.g. sk-ant-api03-xxxxx)
#   4. Go to Settings → Pages → Build and deployment
#      → Source: select "GitHub Actions"
#
# That's it. Every push to main will auto-deploy with the
# key baked into index.html — the key never appears in any
# committed file.
# ==================================================

name: Deploy Foresight Studio to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key into index.html
        run: |
          sed -i 's|__FORESIGHT_KEY__|${{ secrets.FORESIGHT_KEY }}|g' index.html
          echo "✅ API key injected into index.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
